replicaCount: 2
image:
  repository: hivemind/media-service
  tag: 1.0.0
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 8087
resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"
env:
  SPRING_PROFILES_ACTIVE: prod
  EUREKA_SERVER: http://eureka-server:8761/eureka
  POSTGRES_HOST: postgres
  POSTGRES_DB: media_db
