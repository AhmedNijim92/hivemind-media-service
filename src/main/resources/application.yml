server:
  port: 8087

spring:
  application:
    name: media-service
  config:
    import: "optional:configserver:"
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/media_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

aws:
  access-key: ${AWS_ACCESS_KEY:dev-key}
  secret-key: ${AWS_SECRET_KEY:dev-secret}
  region: ${AWS_REGION:us-east-1}
  s3:
    bucket: ${S3_BUCKET:hivemind-media-dev}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
